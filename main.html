<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Intern Form</title>
</head>

<body class="container mt-4">

<h2>Internship Application Form</h2>

<form class="needs-validation" novalidate>

  <!-- First Name -->
  <div class="mb-3">
    <label class="form-label">First Name</label>
    <input type="text" class="form-control" id="first-name-input" required>
    <div class="invalid-feedback">
      Please provide a valid first name.
    </div>
  </div>

  <!-- Last Name -->
  <div class="mb-3">
    <label class="form-label">Last Name</label>
    <input type="text" class="form-control" id="last-name-input" required>
    <div class="invalid-feedback">
      Please provide a valid last name.
    </div>
  </div>

  <!-- Email -->
  <div class="mb-3">
    <label class="form-label">Email</label>
    <input type="email" class="form-control" id="email-input" required>
    <div class="invalid-feedback">
      Please provide a valid email.
    </div>
  </div>

  <!-- College Name -->
  <div class="mb-3">
    <label class="form-label">College Name</label>
    <input type="text" class="form-control" id="college-input" required>
    <div class="invalid-feedback">
      Please provide your college name.
    </div>
  </div>

  <!-- Roll Number -->
  <div class="mb-3">
    <label class="form-label">Roll Number</label>
    <input type="number" class="form-control" id="roll-no-input" required>
    <div class="invalid-feedback">
      Please provide a valid roll number.
    </div>
  </div>

  <!-- Graduation Year -->
  <div class="mb-3">
    <label class="form-label">Graduation Year</label>
    <select class="form-select" required>
      <option value="">Select Year</option>
      <option>2020</option>
      <option>2021</option>
      <option>2022</option>
      <option>2023</option>
    </select>
    <div class="invalid-feedback">
      Please select your graduation year.
    </div>
  </div>

  <!-- Conditions Checkbox -->
  <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" id="conditions-checkbox" required>
    <label class="form-check-label">
      I agree to the terms and conditions
    </label>
    <div class="invalid-feedback">
      You must agree before submitting.
    </div>
  </div>

  <!-- Submit Button -->
  <button class="btn btn-primary" type="submit">Submit</button>

</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
